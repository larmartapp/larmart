<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAR Mart</title>

<!-- PWA REQUIREMENT -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
  font-family: Arial;
  padding:15px;
  background:#f2f2f2;
}

.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo{
  height:40px;
}

h2{
  margin:0;
}

.top-add{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

.category{
  background:white;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
}

.item{
  border:1px solid #ddd;
  padding:8px;
  margin-bottom:8px;
  border-radius:6px;
}

.row{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  margin-top:6px;
}

input{ padding:4px; }

.category-name{
  font-weight:bold;
  font-size:18px;
  border:none;
  background:transparent;
}

.qty{
  width:40px;
  text-align:center;
}

button{
  padding:5px 8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.select{ background:#2196F3; color:white; }
.plus{ background:#4CAF50; color:white; }
.minus{ background:#ff9800; color:white; }
.delete{ background:#e53935; color:white; }
.add{ background:#673AB7; color:white; }

.finish{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#000;
  color:white;
  font-size:16px;
}

.selected{
  background:#c8e6c9;
}

#searchBar{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2>LAR Mart</h2>
</div>

<div class="top-add">
  <input id="searchBar" placeholder="Search category or item..." onkeyup="render()">
  <input id="newCategory" placeholder="New Category">
  <button class="add" onclick="addCategory()">Add Category</button>
  <button class="delete" onclick="deleteAll()">Delete All</button>
  <button onclick="exportData()">Export Backup</button>
  <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  <button onclick="document.getElementById('importFile').click()">Import Backup</button>
</div>

<div id="list"></div>

<button class="finish" onclick="computeTotal()">Finish & Compute Total</button>

<script>
/* ===== SERVICE WORKER ===== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./service-worker.js');
  });
}

/* ===== APP DATA ===== */
let groceries = JSON.parse(localStorage.getItem("groceries")) || {
  "Personal Care":[ {id: Date.now(), name:"Toothpaste", price:120, qty:1, selected:false} ]
};

/* ===== HELPER FUNCTIONS ===== */
function normalize(){
  Object.keys(groceries).forEach(cat=>{
    groceries[cat].forEach(item=>{
      if(!item.qty || isNaN(item.qty)) item.qty=1;
      if(isNaN(item.price)) item.price=0;
      if(typeof item.selected !== "boolean") item.selected=false;
      if(!item.id) item.id = Date.now() + Math.random(); // ensure unique id
    });
  });
}

function save(){
  localStorage.setItem("groceries", JSON.stringify(groceries));
}

/* ===== RENDER ===== */
function render(){
  normalize();
  save();

  const list=document.getElementById("list");
  list.innerHTML="";

  const searchValue=document.getElementById("searchBar").value.toLowerCase();
  const sortedCategories=Object.keys(groceries).sort((a,b)=>a.localeCompare(b));

  sortedCategories.forEach(category=>{
    const categoryMatch=category.toLowerCase().includes(searchValue);
    let hasMatch=false;

    groceries[category].forEach(item=>{
      if(item.name.toLowerCase().includes(searchValue) || categoryMatch) hasMatch=true;
    });
    if(searchValue && !hasMatch) return;

    const catDiv=document.createElement("div");
    catDiv.className="category";

    catDiv.innerHTML=`
      <input class="category-name" value="${category}" onchange="renameCategory('${category}',this.value)">
      <button class="delete" onclick="deleteCategory('${category}')">Delete Category</button>
      <hr>
    `;

    const sortedItems=[...groceries[category]].sort((a,b)=>a.name.localeCompare(b.name));

    sortedItems.forEach(item=>{
      if(searchValue && !categoryMatch && !item.name.toLowerCase().includes(searchValue)) return;

      const itemDiv=document.createElement("div");
      itemDiv.className="item";
      if(item.selected) itemDiv.classList.add("selected");

      itemDiv.innerHTML=`
        <div>
          <input value="${item.name}" onchange="updateNameById('${category}',${item.id},this.value)">
          <input type="text" value="₱${parseFloat(item.price).toFixed(2)}"
            onfocus="this.value=this.value.replace('₱','')"
            onblur="formatPriceById('${category}',${item.id},this)">
        </div>

        <div class="row">
          <button class="minus" onclick="changeQtyById('${category}',${item.id},-1)">-</button>
          <span class="qty">${item.qty}</span>
          <button class="plus" onclick="changeQtyById('${category}',${item.id},1)">+</button>
          <button class="select" onclick="toggleSelectById('${category}',${item.id})">
            ${item.selected ? "Unselect":"Select"}
          </button>
          <button class="delete" onclick="deleteItemById('${category}',${item.id})">Delete</button>
        </div>
      `;

      catDiv.appendChild(itemDiv);
    });

    catDiv.innerHTML += `
      <input id="item-${category}" placeholder="Item Name">
      <input id="price-${category}" type="number" placeholder="Price">
      <button class="add" onclick="addItem('${category}')">Add Item</button>
    `;

    list.appendChild(catDiv);
  });
}

/* ===== ITEM / CATEGORY FUNCTIONS (ID-BASED) ===== */
function addItem(category){
  const name=document.getElementById("item-"+category).value.trim();
  const price=parseFloat(document.getElementById("price-"+category).value)||0;
  if(!name) return;

  groceries[category].push({
    id: Date.now() + Math.random(),
    name,
    price,
    qty:1,
    selected:false
  });
  save();
  render();
  document.getElementById("item-"+category).value="";
  document.getElementById("price-"+category).value="";
}

function toggleSelectById(category, id){
  const item = groceries[category].find(i => i.id === id);
  if(!item) return;
  item.selected = !item.selected;
  save();
  render();
}

function changeQtyById(category, id, amount){
  const item = groceries[category].find(i => i.id === id);
  if(!item) return;
  item.qty = Math.max(1, item.qty + amount);
  save();
  render();
}

function updateNameById(category, id, value){
  const item = groceries[category].find(i => i.id === id);
  if(!item) return;
  item.name = value;
  save();
}

function formatPriceById(category, id, input){
  const item = groceries[category].find(i => i.id === id);
  if(!item) return;
  item.price = parseFloat(input.value)||0;
  input.value = "₱" + item.price.toFixed(2);
  save();
}

function deleteItemById(category, id){
  const index = groceries[category].findIndex(i => i.id === id);
  if(index < 0) return;
  groceries[category].splice(index,1);
  save();
  render();
}

/* ===== CATEGORY FUNCTIONS ===== */
function addCategory(){
  const name=document.getElementById("newCategory").value.trim();
  if(!name || groceries[name]) return;
  groceries[name]=[];
  save();
  render();
  document.getElementById("newCategory").value="";
}

function renameCategory(oldName,newName){
  newName=newName.trim();
  if(!newName){ alert("Category name cannot be empty"); render(); return; }
  if(groceries[newName]){ alert("Category already exists"); render(); return; }
  groceries[newName]=groceries[oldName];
  delete groceries[oldName];
  save();
  render();
}

function deleteCategory(category){ delete groceries[category]; save(); render(); }

function deleteAll(){ if(confirm("Delete everything?")){ groceries={}; localStorage.removeItem("groceries"); render(); } }

/* ===== COMPUTE TOTAL ===== */
function computeTotal(){
  let total=0;
  Object.keys(groceries).forEach(category=>{
    groceries[category].forEach(item=>{
      if(item.selected){
        total+=(parseFloat(item.price)||0)*(parseInt(item.qty)||1);
      }
    });
  });
  alert("Total: ₱"+total.toFixed(2));
}

/* ===== BACKUP / RESTORE ===== */
function exportData(){
  const data=JSON.stringify(groceries);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="lar-mart-backup.json";
  a.click();
}

function importData(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      groceries=JSON.parse(e.target.result);
      save();
      render();
      alert("Backup Restored Successfully!");
    }catch{
      alert("Invalid backup file.");
    }
  };
  reader.readAsText(file);
}

/* ===== INITIAL RENDER ===== */
render();
</script>

</body>
</html>
