<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAR Mart</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
display:flex;
align-items:center;
gap:10px;
background:#2c3e50;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.header img{
width:40px;
height:40px;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th, td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#34495e;
color:white;
}

.search{
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
<img src="icon.png">
LAR Mart
</div>

<div class="container">

<input type="text" id="itemName" placeholder="Item name">
<input type="number" id="itemQty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="backupData()">Backup</button>

<br><br>

<input class="search" type="text" id="search" placeholder="Search item..." onkeyup="searchItem()">

<table id="inventoryTable">

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Action</th>
</tr>
</thead>

<tbody id="inventoryBody">
</tbody>

</table>

</div>

<script>

let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

function saveData(){
localStorage.setItem("inventory", JSON.stringify(inventory));
}

function displayItems(){

let body = document.getElementById("inventoryBody");
body.innerHTML="";

inventory.forEach((item,index)=>{

let row=`
<tr>
<td>${item.name}</td>
<td>${item.qty}</td>
<td>
<button onclick="deleteItem(${index})">Delete</button>
</td>
</tr>
`;

body.innerHTML+=row;

});

}

function addItem(){

let name=document.getElementById("itemName").value;
let qty=document.getElementById("itemQty").value;

if(name=="" || qty==""){
alert("Enter item and qty");
return;
}

inventory.push({name:name,qty:qty});

saveData();
displayItems();

document.getElementById("itemName").value="";
document.getElementById("itemQty").value="";

}

function deleteItem(index){

inventory.splice(index,1);

saveData();
displayItems();

}

function searchItem(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#inventoryBody tr");

rows.forEach(row=>{

let text=row.innerText.toLowerCase();

row.style.display=text.includes(input) ? "" : "none";

});

}

function backupData(){

let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(inventory));

let dl = document.createElement("a");

dl.setAttribute("href", dataStr);
dl.setAttribute("download", "LARmart_backup.json");

dl.click();

}

displayItems();

</script>

</body>
</html>
