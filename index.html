<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAR Mart</title>

<!-- PWA REQUIREMENT -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
  font-family: Arial;
  padding:15px;
  background:#f2f2f2;
}

.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo{
  height:40px;
}

h2{
  margin:0;
}

.top-add{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

.category{
  background:white;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
}

.item{
  border:1px solid #ddd;
  padding:8px;
  margin-bottom:8px;
  border-radius:6px;
}

.row{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  margin-top:6px;
}

input{ padding:4px; }

.category-name{
  font-weight:bold;
  font-size:18px;
  border:none;
  background:transparent;
}

.qty{
  width:40px;
  text-align:center;
}

button{
  padding:5px 8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.select{ background:#2196F3; color:white; }
.plus{ background:#4CAF50; color:white; }
.minus{ background:#ff9800; color:white; }
.delete{ background:#e53935; color:white; }
.add{ background:#673AB7; color:white; }

.finish{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#000;
  color:white;
  font-size:16px;
}

.selected{
  background:#c8e6c9;
}

#searchBar{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2>LAR Mart</h2>
</div>

<div class="top-add">
  <input id="searchBar" placeholder="Search category or item..." onkeyup="render()">
  <input id="newCategory" placeholder="New Category">
  <button class="add" onclick="addCategory()">Add Category</button>
  <button class="delete" onclick="deleteAll()">Delete All</button>
  <button onclick="exportData()">Export Backup</button>
  <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  <button onclick="document.getElementById('importFile').click()">Import Backup</button>
</div>

<div id="list"></div>

<button class="finish" onclick="computeTotal()">Finish & Compute Total</button>

<script>

/* ===== SERVICE WORKER REGISTRATION (IMPORTANT) ===== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./service-worker.js');
  });
}

/* ===== YOUR ORIGINAL APP CODE (UNCHANGED) ===== */

let groceries = JSON.parse(localStorage.getItem("groceries")) || {
  "Personal Care":[
    {name:"Toothpaste", price:120, qty:1, selected:false}
  ]
};

function normalize(){
  Object.keys(groceries).forEach(cat=>{
    groceries[cat].forEach(item=>{
      if(!item.qty || isNaN(item.qty)) item.qty=1;
      if(isNaN(item.price)) item.price=0;
      if(typeof item.selected !== "boolean") item.selected=false;
    });
  });
}

function save(){
  localStorage.setItem("groceries", JSON.stringify(groceries));
}

function render(){
  normalize();
  save();

  const list=document.getElementById("list");
  list.innerHTML="";

  const searchValue=document.getElementById("searchBar").value.toLowerCase();

  const sortedCategories=Object.keys(groceries).sort((a,b)=>a.localeCompare(b));

  sortedCategories.forEach(category=>{

    const categoryMatch=category.toLowerCase().includes(searchValue);
    let hasMatch=false;

    groceries[category].forEach(item=>{
      if(item.name.toLowerCase().includes(searchValue) || categoryMatch){
        hasMatch=true;
      }
    });

    if(searchValue && !hasMatch) return;

    const catDiv=document.createElement("div");
    catDiv.className="category";

    catDiv.innerHTML=`
      <input class="category-name"
        value="${category}"
        onchange="renameCategory('${category}',this.value)">
      <button class="delete"
        onclick="deleteCategory('${category}')">
        Delete Category
      </button>
      <hr>
    `;

    const sortedItems=[...groceries[category]]
      .sort((a,b)=>a.name.localeCompare(b.name));

    sortedItems.forEach(item=>{
      const index=groceries[category].indexOf(item);

      if(searchValue &&
         !categoryMatch &&
         !item.name.toLowerCase().includes(searchValue))
         return;

      const itemDiv=document.createElement("div");
      itemDiv.className="item";
      if(item.selected) itemDiv.classList.add("selected");

      itemDiv.innerHTML=`
        <div>
          <input value="${item.name}"
            onchange="updateName('${category}',${index},this.value)">
          <input type="text"
            value="₱${parseFloat(item.price).toFixed(2)}"
            onfocus="this.value=this.value.replace('₱','')"
            onblur="formatPrice(this,'${category}',${index})">
        </div>

        <div class="row">
          <button class="minus"
            onclick="changeQty('${category}',${index},-1)">-</button>

          <span class="qty">${item.qty}</span>

          <button class="plus"
            onclick="changeQty('${category}',${index},1)">+</button>

          <button class="select"
            onclick="toggleSelect('${category}',${index})">
            ${item.selected ? "Unselect":"Select"}
          </button>

          <button class="delete"
            onclick="deleteItem('${category}',${index})">
            Delete
          </button>
        </div>
      `;

      catDiv.appendChild(itemDiv);
    });

    list.appendChild(catDiv);
  });
}

function addCategory(){
  const name=document.getElementById("newCategory").value.trim();
  if(!name || groceries[name]) return;
  groceries[name]=[];
  save();
  render();
}

function deleteAll(){
  if(confirm("Delete everything?")){
    groceries={};
    localStorage.removeItem("groceries");
    render();
  }
}

function computeTotal(){
  let total=0;
  Object.keys(groceries).forEach(category=>{
    groceries[category].forEach(item=>{
      if(item.selected){
        total+=(parseFloat(item.price)||0)*
               (parseInt(item.qty)||1);
      }
    });
  });
  alert("Total: ₱"+total.toFixed(2));
}

function exportData(){
  const data=JSON.stringify(groceries);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="lar-mart-backup.json";
  a.click();
}

function importData(event){
  const file=event.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(e){
    groceries=JSON.parse(e.target.result);
    save();
    render();
    alert("Backup Restored Successfully!");
  };
  reader.readAsText(file);
}

render();

</script>

</body>
</html>
